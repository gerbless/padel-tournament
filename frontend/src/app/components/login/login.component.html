<div class="login-container fade-in">
    <div class="login-card">
        <div class="logo">
            🎾 PADEL MGR
        </div>
        <h2>Iniciar Sesión</h2>

        <form (ngSubmit)="login()">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" [(ngModel)]="username" name="username" class="form-control"
                    placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" [(ngModel)]="password" name="password" class="form-control"
                    placeholder="••••••••" required>
            </div>

            <div *ngIf="error" class="error-message">
                {{ error }}
                <button *ngIf="showResend" class="resend-btn" (click)="resendVerification()">
                    Reenviar email de verificación
                </button>
            </div>

            <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
                <span *ngIf="loading">Cargando...</span>
                <span *ngIf="!loading">Ingresar</span>
            </button>
        </form>

        <div class="register-link" style="text-align: center; margin-top: 1.25rem;">
            <span style="color: var(--text-secondary);">¿No tienes cuenta?</span>
            <a routerLink="/register" style="color: var(--primary); margin-left: 0.5rem; text-decoration: none; font-weight: 500;">Registrarse</a>
        </div>
    </div>
</div>
