<div class="register-container fade-in">
    <div class="register-card">
        <div class="logo">🎾 PADEL MGR</div>
        <h2>Crear Cuenta</h2>
        <p class="subtitle" *ngIf="clubName">Registrarse en <strong>{{ clubName }}</strong></p>

        <form (ngSubmit)="register()">
            <div class="form-group">
                <label for="name">Nombre Completo *</label>
                <input type="text" id="name" [(ngModel)]="name" name="name" class="form-control"
                    placeholder="Tu nombre completo" required>
            </div>

            <div class="form-group">
                <label>Identificación</label>
                <div class="id-row">
                    <div class="id-type">
                        <label class="radio-label">
                            <input type="radio" name="idType" [checked]="identificationType === 'RUT'"
                                (change)="identificationType = 'RUT'"> RUT
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="idType" [checked]="identificationType === 'PASAPORTE'"
                                (change)="identificationType = 'PASAPORTE'"> Pasaporte
                        </label>
                    </div>
                    <input type="text" [(ngModel)]="identification" name="identification" class="form-control"
                        [placeholder]="identificationType === 'RUT' ? '12.345.678-9' : 'Número de pasaporte'"
                        (input)="onIdentificationInput($event)">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" [(ngModel)]="email" name="email" class="form-control"
                    placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña *</label>
                <input type="password" id="password" [(ngModel)]="password" name="password" class="form-control"
                    placeholder="Mínimo 6 caracteres" required>
            </div>

            <div class="form-group">
                <label for="passwordConfirm">Confirmar Contraseña *</label>
                <input type="password" id="passwordConfirm" [(ngModel)]="passwordConfirm" name="passwordConfirm"
                    class="form-control" placeholder="Repetir contraseña" required>
            </div>

            <div *ngIf="error" class="error-message">{{ error }}</div>

            <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
                <span *ngIf="loading">Registrando...</span>
                <span *ngIf="!loading">Crear Cuenta</span>
            </button>
        </form>

        <div class="login-link">
            ¿Ya tienes cuenta? <a routerLink="/login">Iniciar Sesión</a>
        </div>
    </div>
</div>
